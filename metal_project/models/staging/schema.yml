# models/staging/sources.yml
version: 2

sources:
  - name: public
    database: postgres
    schema: public
    tables:
      - name: raw_metal_prices
      - name: raw_crypto_prices
      - name: raw_fx_rates
      - name: raw_macro_indicators

models:
  - name: stg_metal_prices
    columns:
      - name: metal
        tests:
          - accepted_values:
              values: ['GOLD', 'SILVER', 'PLATINIUM']
      - name: price
        tests:
          - not_null

  - name: stg_crypto_prices
    columns:
      - name: price
        tests:
          - not_null

  - name: stg_macro_indicators
    columns:
      - name: date
        tests:
          - not_null
      - name: indicator_name
        tests:
          - not_null
      - name: value
        tests:
          - not_null

  - name: stg_fx_rates
    columns:
      - name: date
        tests:
          - not_null
      - name: rate
        tests:
          - not_null